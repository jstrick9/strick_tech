# ═══════════════════════════════════════════════════════════════
#  Agentic OS — Docker Compose
#  Run: docker compose up
#  With Qdrant: docker compose --profile qdrant up
# ═══════════════════════════════════════════════════════════════
version: "3.9"

services:
  agentic-os:
    build: .
    ports:
      - "8787:8787"
    environment:
      - AGENTIC_OS_PORT=8787
      - AGENTIC_OS_HOST=0.0.0.0
      # Set your API key here or use the Vault UI
      # - OPENROUTER_API_KEY=sk-or-v1-...
    volumes:
      # Persist memory database and vault key
      - agentic-memory:/app/memory
      # Persist preview files
      - agentic-preview:/app/preview
      # Mount .env file if it exists
      - ./.env:/app/.env:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/api/system/stats"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Optional: Qdrant vector database for semantic memory
  # Run with: docker compose --profile qdrant up
  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["qdrant"]
    ports:
      - "6333:6333"
    volumes:
      - qdrant-storage:/qdrant/storage
    restart: unless-stopped

volumes:
  agentic-memory:
  agentic-preview:
  qdrant-storage:
