<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic OS Platform — Starting Mission Control...</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #07080f;
    color: #f4f6ff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Inter, system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 30px;
    text-align: center;
  }
  .card {
    background: #0c0e1a;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 20px;
    padding: 40px;
    max-width: 650px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
  }
  .logo {
    font-size: 48px;
    margin-bottom: 16px;
    animation: pulse 2s infinite ease-in-out;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.06); opacity: 0.85; }
  }
  h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; }
  p { font-size: 14px; color: #a0aec0; margin-bottom: 24px; line-height: 1.5; }
  .spinner-container { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 24px; }
  .spinner {
    width: 20px; height: 20px;
    border: 3px solid rgba(91, 138, 248, 0.2);
    border-top-color: #5b8af8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #status { font-weight: 600; font-size: 14px; color: #5b8af8; }
  .log-box {
    display: none;
    text-align: left;
    background: #05060a;
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 12px;
    padding: 16px;
    margin-top: 20px;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: #fca5a5;
    max-height: 320px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .btn {
    display: inline-block;
    background: #5b8af8;
    color: #fff;
    font-weight: 700;
    font-size: 13px;
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin-top: 16px;
    transition: background 0.15s;
  }
  .btn:hover { background: #4a77e0; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡</div>
    <h1>Agentic OS Platform v11.5.0</h1>
    <p>Local-first AI Operating System · Created by Joshua Strickland & Strick Tech</p>
    <div class="spinner-container">
      <div class="spinner" id="spinner"></div>
      <div id="status">Starting embedded AI engine & multi-agent swarm...</div>
    </div>
    <div id="log-container" class="log-box"></div>
    <button id="retry-btn" class="btn" style="display:none;" onclick="checkHealthOnce()">↻ Retry Connection</button>
  </div>

<script>
  let checks = 0;
  const maxChecks = 150; // 15 seconds (100ms interval)
  
  function checkHealth() {
    checks++;
    fetch('http://localhost:8787/api/health')
      .then(r => {
        if (r.ok) {
          return r.json();
        }
        throw new Error('HTTP ' + r.status);
      })
      .then(data => {
        document.getElementById('status').innerHTML = '✅ Engine confirmed online! Launching Mission Control...';
        document.getElementById('spinner').style.display = 'none';
        setTimeout(() => {
          window.location.replace('http://localhost:8787/?_cb=' + Date.now() + (window.location.hash || ''));
        }, 150);
      })
      .catch(err => {
        if (checks < maxChecks) {
          setTimeout(checkHealth, 100);
        } else {
          showDiagnostic();
        }
      });
  }

  function checkHealthOnce() {
    document.getElementById('status').innerHTML = 'Re-checking engine status...';
    document.getElementById('status').style.color = '#5b8af8';
    document.getElementById('spinner').style.display = 'inline-block';
    document.getElementById('retry-btn').style.display = 'none';
    checks = maxChecks - 15;
    checkHealth();
  }

  function showDiagnostic() {
    document.getElementById('status').innerHTML = '⚠️ Backend startup took longer than 15s. Displaying diagnostics...';
    document.getElementById('status').style.color = '#ef4444';
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('retry-btn').style.display = 'inline-block';
    
    const logBox = document.getElementById('log-container');
    logBox.style.display = 'block';
    logBox.textContent = 'Reading diagnostic log from ~/Library/Application Support/com.stricktech.agenticos/backend.log...';

    // Try multiple Tauri v2 IPC invocation paths
    const invoke = (window.__TAURI__ && window.__TAURI__.core && window.__TAURI__.core.invoke) ||
                   (window.__TAURI__ && window.__TAURI__.invoke) ||
                   (window.__TAURI_INTERNALS__ && window.__TAURI_INTERNALS__.invoke);
                   
    if (invoke) {
      invoke('get_backend_log')
        .then(logText => {
          logBox.textContent = logText;
        })
        .catch(ipcErr => {
          logBox.textContent = 'Tauri IPC error reading log: ' + ipcErr + '\n\nPlease check log manually at:\n~/Library/Application Support/com.stricktech.agenticos/backend.log';
        });
    } else {
      logBox.textContent = 'Tauri IPC bridge not found on window object.\n\nPlease open Terminal and run:\ncat ~/Library/Application\\ Support/com.stricktech.agenticos/backend.log';
    }
  }

  // Start polling immediately
  setTimeout(checkHealth, 150);
</script>
</body>
</html>
