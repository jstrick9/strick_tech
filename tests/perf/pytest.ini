[pytest]
testpaths = tests/perf
python_files = test_perf_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
log_level = WARNING
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
addopts = -v --tb=short -p no:warnings -s -p pytest_asyncio
