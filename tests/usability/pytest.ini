[pytest]
testpaths = tests/usability
python_files = test_use_*.py
python_classes = TestUse*
python_functions = test_*
asyncio_mode = auto
log_level = WARNING
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
addopts = -v --tb=short -p no:warnings -p pytest_asyncio
