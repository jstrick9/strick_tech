[pytest]
testpaths = tests/security
python_files = test_sec_*.py
python_classes = TestSec*
python_functions = test_*
asyncio_mode = auto
log_level = WARNING
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
addopts = -v --tb=short -p no:warnings -s -p pytest_asyncio
