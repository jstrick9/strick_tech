[pytest]
testpaths = tests/regression
python_files = test_reg_*.py
python_classes = TestRegression*
python_functions = test_*
asyncio_mode = auto
log_level = WARNING
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
addopts = -v --tb=short -p no:warnings
