[pytest]
testpaths = tests/system
python_files = test_sys_*.py
python_classes = TestSys*
python_functions = test_*
asyncio_mode = auto
log_level = WARNING
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
addopts = -v --tb=short -p no:warnings
