[tool.ruff]
# Agentic OS — Ruff Linting Configuration
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "S",   # flake8-bandit (security)
    "T20", # flake8-print
    "SIM", # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "S101",   # use of assert (allowed in tests)
    "T201",   # print found (allowed in CLI)
    "B008",   # function call in default argument (FastAPI Depends)
    "SIM108", # use ternary operator (not always clearer)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "T201", "S105", "S106"]
"run.py" = ["T201"]

[tool.ruff.format]
quote-style = "single"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
