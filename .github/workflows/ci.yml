name: Agentic OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agentic-os-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  AGENTIC_OS_DATA_DIR: ${{ runner.temp }}/agentic-os-data
  AGENTIC_OS_HOST: 127.0.0.1
  AGENTIC_OS_PORT: '8787'
  RATE_LIMIT_MAX: '10000'

jobs:
  python-quality:
    name: Python quality and unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Compile Python modules
        run: python -m compileall -q backend run.py

      - name: Run unit tests
        run: python -m pytest tests/unit -q

  live-api:
    name: Live security and integration suites
    runs-on: ubuntu-latest
    needs: python-quality
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-test.txt

      - name: Start isolated API server
        run: |
          mkdir -p "$AGENTIC_OS_DATA_DIR"
          nohup python -m uvicorn backend.app:app --host "$AGENTIC_OS_HOST" --port "$AGENTIC_OS_PORT" >"$RUNNER_TEMP/agentic-os-server.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/agentic-os-server.pid"
          for attempt in {1..30}; do
            if curl --fail --silent "http://$AGENTIC_OS_HOST:$AGENTIC_OS_PORT/api/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/agentic-os-server.log"
          exit 1

      - name: Run security suite
        run: python -m pytest tests/security -q

      - name: Run integration suite
        run: python -m pytest tests/integration -q

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: agentic-os-server-log
          path: ${{ runner.temp }}/agentic-os-server.log

  javascript-and-browser:
    name: JavaScript and browser smoke tests
    runs-on: ubuntu-latest
    needs: python-quality
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install Python and browser dependencies
        run: |
          python -m pip install -r requirements-test.txt
          python -m playwright install --with-deps chromium

      - name: Start isolated API server
        run: |
          mkdir -p "$AGENTIC_OS_DATA_DIR"
          nohup python -m uvicorn backend.app:app --host "$AGENTIC_OS_HOST" --port "$AGENTIC_OS_PORT" >"$RUNNER_TEMP/agentic-os-browser-server.log" 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent "http://$AGENTIC_OS_HOST:$AGENTIC_OS_PORT/api/health" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat "$RUNNER_TEMP/agentic-os-browser-server.log"
          exit 1

      - name: Run browser E2E suite
        run: python -m pytest tests/e2e_browser -q

  frontend-install:
    name: Frontend dependency reproducibility
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install from lockfile
        run: npm ci
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
